name: ASD Smart CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  pipeline:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────
      # 1. Checkout
      # ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────
      # 2. Python setup
      # ─────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      # ─────────────────────────────
      # 3. Install dependencies
      # ─────────────────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc mlflow dagshub pytest

      # ─────────────────────────────
      # 4. DagsHub credentials
      # ─────────────────────────────
      - name: Set DagsHub credentials
        run: |
          echo "MLFLOW_TRACKING_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      # ─────────────────────────────
      # 5. Pull DVC data
      # ─────────────────────────────
      - name: Pull DVC artifacts
        run: |
          dvc pull

      # ─────────────────────────────
      # 6. Check if pipeline needs run
      # ─────────────────────────────
      - name: Check DVC status
        id: dvc_status
        run: |
          dvc status > dvc_status.txt
          cat dvc_status.txt

          if grep -q "feature_extraction" dvc_status.txt || \
             grep -q "model_training" dvc_status.txt || \
             grep -q "model_evaluation" dvc_status.txt; then
            echo "RUN_PIPELINE=true" >> $GITHUB_ENV
          else
            echo "RUN_PIPELINE=false" >> $GITHUB_ENV
          fi

      # ─────────────────────────────
      # 7. Run only if needed
      # ─────────────────────────────
      - name: Run Selected DVC Stages
        if: env.RUN_PIPELINE == 'true'
        run: |
          dvc repro feature_extraction model_training model_evaluation

      # ─────────────────────────────
      # 8. Run tests
      # ─────────────────────────────
      - name: Run tests
        run: |
          pytest tests/

  # ─────────────────────────────
  # 🚀 DEPLOYMENT JOB
  # ─────────────────────────────
  deploy:
    needs: pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flask mlflow dagshub gunicorn

      - name: Set DagsHub Token
        run: |
          echo "DAGSHUB_TOKEN=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      # Optional: health check before deploy
      - name: Test app startup
        run: |
          python app.py & sleep 10
          curl http://127.0.0.1:5000/health

      # Simulated deployment (replace later with cloud)
      - name: Run Flask App (Production)
        run: |
          gunicorn app:app --bind 0.0.0.0:5000