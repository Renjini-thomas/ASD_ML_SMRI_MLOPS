name: ASD MLOps Pipeline

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
permissions:
  actions: write
  contents: read

jobs:

  # ---------------- CI PIPELINE ----------------
  ci:
    name: CI - Code & Pipeline Check
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc mlflow dagshub
      - name: Load Mlflow URI
        run: |
          echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV

      - name: Load DagsHub Secrets
        run: |
          echo "DAGSHUB_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> $GITHUB_ENV
          echo "DAGSHUB_TOKEN=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      # ✅ Fast validation only
      - name: Check required files
        run: |
          test -f app.py || exit 1
          test -f dvc.yaml || exit 1

      # ✅ Check pipeline without running heavy steps
      - name: Validate DVC Pipeline
        run: |
          dvc dag

      # ✅ Test Flask app
      - name: Test Flask App
        run: |
          python app.py & sleep 10
          curl http://127.0.0.1:5000/health

  
  # ---------------- CD PIPELINE ----------------
  cd:
    name: CD - Deploy Only
    runs-on: ubuntu-latest
    needs: ci

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: |
          pip install -r requirements.txt
          pip install dvc mlflow dagshub

      - run: |
          echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV
          echo "DAGSHUB_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> $GITHUB_ENV
          echo "DAGSHUB_TOKEN=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      # # Pull latest artifacts
      # - name: Pull DVC data
      #   run: dvc pull

      # ---------------- DOCKER ----------------
      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/asd-autism-detector:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/asd-autism-detector:latest