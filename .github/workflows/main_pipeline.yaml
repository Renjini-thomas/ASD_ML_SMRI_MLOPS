name: ASD Simple CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc mlflow dagshub

      # 4. Load secrets
      - name: Load DagsHub Secrets
        run: |
          echo "DAGSHUB_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> $GITHUB_ENV
          echo "DAGSHUB_TOKEN=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      # 5. Basic checks
      - name: Check required files
        run: |
          test -f app.py || exit 1
          test -f dvc.yaml || exit 1

      # 6. Pull DVC data
      - name: Pull DVC data
        run: |
          dvc pull

      # 7. Run pipeline ONLY if needed (DVC handles this internally)
      - name: Run DVC Pipeline
        run: |
          dvc repro --single-item feature_extraction model_training model_evaluation

      # 8. Test Flask app
      - name: Test Flask App
        run: |
          python app.py & sleep 10
          curl http://127.0.0.1:5000/health
      
      # Docker login
      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/asd-autism-detector:latest .

      # Push image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/asd-autism-detector:latest