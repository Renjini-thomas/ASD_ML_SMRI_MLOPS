name: ASD Retraining Pipeline

on:
  workflow_dispatch:   # manual trigger
  schedule:
    - cron: "0 2 * * 0"   # every Sunday 2 AM

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:

      # Checkout
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc mlflow dagshub

      # Load secrets
      - name: Load Secrets
        run: |
          echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV
          echo "DAGSHUB_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> $GITHUB_ENV
          echo "DAGSHUB_TOKEN=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      # Pull DVC data
      - name: Pull DVC Data
        run: dvc pull

      # 🔥 FULL PIPELINE (IMPORTANT)
      - name: Preprocessing
        run: python -m src.pipeline.preprocessing_pipeline

      - name: Feature Extraction
        run: python -m src.pipeline.feature_extraction_pipeline

      - name: Model Training
        run: python -m src.pipeline.model_training_pipeline

      - name: Model Evaluation
        run: python -m src.pipeline.model_evaluation_pipeline